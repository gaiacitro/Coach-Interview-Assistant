<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Helvetica', sans-serif;
            background-color: black;
        }
        
        .avatar-video {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; object-fit: cover;
            /*transition: opacity 0.5s ease; /* Aggiunta una transizione per sfumare il video */
        }

        #video-zitto { z-index: 1; opacity: 1; }
        #video-parla { z-index: 2; opacity: 0; }

        #top-bar { position: absolute; top: 10%; width: 100%; text-align: center; z-index: 10; transition: top 0.5s; }
        
        .instruction-style {
            font-size: 32px; font-weight: bold; color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); padding: 0 40px;
        }

        .question-style {
            font-size: 22px; font-weight: bold; color: black; 
            background-color: rgba(255, 255, 255, 0.95); padding: 15px 35px; 
            border-radius: 30px; display: inline-block; max-width: 80%; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4); 
        }

        #bottom-bar { position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 10; }
        #info { font-size: 18px; color: #e2e8f0; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* --- NUOVO: STILE PER L'ANIMAZIONE DI CARICAMENTO --- */
        .loader {
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #ABC07A; /* Il tuo colore principale */
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none; /* Nascosto all'inizio */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <video id="video-zitto" class="avatar-video" src="assets/loop_zitto.mp4" autoplay loop muted preload="auto"></video>
    <video id="video-parla" class="avatar-video" src="assets/loop_parla.mp4" muted preload="auto"></video>

    <div id="top-bar">
        <div id="question" class="instruction-style">Press SPACE to show the first question and begin...</div>
    </div>

    <div id="bottom-bar">
        <div id="loader" class="loader"></div> 
        <div id="info">Press [SPACE] when you have finished answering to proceed to the next question</div>
    </div>

    <script>
        const videoZitto = document.getElementById('video-zitto');
        const videoParla = document.getElementById('video-parla');

        let interviewState = "active"; 

        videoParla.currentTime = 0;

        videoParla.addEventListener('ended', function() {
            // 1. give the "play" command to the zitto video, which is already at the right frame and just waiting for this trigger to start moving again.
            videoZitto.play(); 
            
            // 2. ask the browser to execute the following code right before the next repaint, which ensures that the zitto video starts playing immediately after the parla video finishes, without any visual delay or stutter.
            // before repaint, the browser will have already registered the "play" command on the zitto video, so it will be ready to show the first frame of the zitto video as soon as the parla video becomes invisible.
            requestAnimationFrame(() => {
                videoParla.style.opacity = 0; 
                
                // 3. reset the parla video to the beginning, but we do it inside a setTimeout with a very short delay (50ms)
                setTimeout(() => {
                    videoParla.currentTime = 0; 
                }, 50); 
            });
        });

        
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                
                if (interviewState === "active") {
                    window.pywebview.api.get_next_question().then(function(response) {
                        
                        let qDiv = document.getElementById('question');
                        let infoDiv = document.getElementById('info');
                        let loaderDiv = document.getElementById('loader');
                        let topBar = document.getElementById('top-bar');

                        if (response === "END") {
                            
                            interviewState = "analyzing";

                            topBar.style.top = "40%"; // Sposta il testo al centro dello schermo
                            qDiv.className = "instruction-style";
                            qDiv.innerText = "Calculating results...";
                            
                            infoDiv.innerText = "Analyzing speech, pauses, and tremor...";
                            loaderDiv.style.display = "block"; // Mostra l'animazione
                            
                            videoParla.style.opacity = 0;
                            videoZitto.style.opacity = 0.4;

                            setTimeout(() => {
                                window.pywebview.api.run_speech_analysis().then(() => {
                                    // Appena finisce di macinare i dati, si chiude da solo!
                                    window.pywebview.api.close_window();
                                });
                            }, 500);
                            
                        } else {
                            qDiv.className = "question-style"; 
                            qDiv.innerText = response;

                            videoZitto.pause();
                            videoZitto.currentTime = 0;

                            videoParla.style.opacity = 1;
                            videoParla.play();
                        }
                    });
                } 
            }
        });
    </script>
</body>
</html>
