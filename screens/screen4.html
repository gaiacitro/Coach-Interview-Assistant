<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Helvetica', sans-serif;
            background-color: black; /* Sfondo scuro di sicurezza */
        }
        
        /* Stile comune a entrambi i video */
        .avatar-video {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; object-fit: cover;
        }

        /* Il video zitto sta sotto (z-index: 1) */
        #video-zitto {
            z-index: 1;
            opacity: 1;
        }

        /* Il video parla sta sopra (z-index: 2) ma all'inizio è invisibile (opacity: 0) */
        #video-parla {
            z-index: 2;
            opacity: 0;
        }

        #top-bar {
            position: absolute; top: 10%; width: 100%; text-align: center; z-index: 10;
        }
        
        .instruction-style {
            font-size: 32px; font-weight: bold; color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8); padding: 0 40px;
        }

        .question-style {
            font-size: 22px; font-weight: bold; color: black; 
            background-color: rgba(255, 255, 255, 0.95); padding: 15px 35px; 
            border-radius: 30px; display: inline-block; max-width: 80%; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4); 
        }

        #bottom-bar {
            position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 10;
        }
        #info {
            font-size: 18px; color: #e2e8f0; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <video id="video-zitto" class="avatar-video" src="assets/loop_zitto0.mp4" autoplay loop muted></video>
    <video id="video-parla" class="avatar-video" src="assets/loop_parla.mp4" muted></video>

    <div id="top-bar">
        <div id="question" class="instruction-style">Press SPACE to show the first question and begin...</div>
    </div>

    <div id="bottom-bar">
        <div id="info">Press [SPACE] when you have finished answering to proceed to the next question</div>
    </div>

    <script>
        const videoZitto = document.getElementById('video-zitto');
        const videoParla = document.getElementById('video-parla');

        // Quando il video "parla" finisce, lo nascondiamo di nuovo
        videoParla.addEventListener('ended', function() {
            videoParla.style.opacity = 0; // Torna invisibile
            // Il video sotto (video-zitto) non si è mai fermato, quindi riappare magicamente!
        });

        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') {
                window.pywebview.api.get_next_question().then(function(response) {
                    
                    let qDiv = document.getElementById('question');
                    let infoDiv = document.getElementById('info');

                    if (response === "END") {
                        qDiv.className = "instruction-style";
                        qDiv.innerText = "Interview finished!";
                        infoDiv.innerText = "Calculating results. Please check the console...";
                        
                        // Nascondiamo il video "parla" per sicurezza
                        videoParla.style.opacity = 0;
                        
                        setTimeout(() => {
                            window.pywebview.api.run_analysis().then(() => {
                                window.pywebview.api.close_window();
                            });
                        }, 500);
                        
                    } else {
                        qDiv.className = "question-style";
                        qDiv.innerText = response;

                        // FACCIAMO APPARIRE IL VIDEO PARLA!
                        videoParla.currentTime = 0; // Lo fa ripartire dall'inizio
                        videoParla.play();          // Lo avvia
                        videoParla.style.opacity = 1; // Lo rende visibile istantaneamente coprendo quello sotto
                    }
                });
            }
        });
    </script>
</body>
</html>
